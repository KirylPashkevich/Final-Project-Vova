<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>add8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content container">
            <div class="logo">Добавление объекта</div>
            <button id="theme-toggle" class="btn-theme"></button>
            <nav>
                <a href="index.html">Katalog</a>
                <a href="add.html">Добавить объект</a>
            </nav>
        </div>
    </header>
    <main class="container">
        <div class="form-container">
            <h2>Регистрация новой хуйнюшки</h2>
            <form id="add-item-form">
                <input type="text" id="name" placeholder="Название предмета" required>
                <!-- <input type="text" id="image_name" placeholder="Имя файла (например: hui.jpg)"> -->
                <div class="input-group">
                    <label>Фото товара</label>
                    <input type="file" id="image_file" accept="image/*" required>
                </div>
                <div class="form-row">
                    <input type="number" id="sector" placeholder="Сектор" required>
                    <input type="number" id="quantity" placeholder="Количество" required>
                </div>
                <input type="number" step="0.1" id="weight" placeholder="Вес (кг)">
                <input type="number" step="0.01" id="price" placeholder="Цена ($)" value="0">
                <label class="checkbox-label">
                    <input type="checkbox" id="is_dangerous">
                </label>
                <button type="submit" id="save-btn">Сохранить в каталог</button>
            </form>
            <div class="preview-section">
                <p>Предпросмотр фото:</p>
                <img id="preview-img" src="https://via.placeholder.com/150" alt="Превью">
            </div>
        </div>
    </main>

   <script src="add-script.js"></script> 
</body>
</html>
